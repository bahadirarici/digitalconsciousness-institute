baseURL: "https://prismatic-yeot-f27bda.netlify.app/"
title: "Institute for Digital Consciousness"
theme: ["PaperMod"]

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Institute for Digital Consciousness"
  description: "Academic research on machine consciousness and AI ethics."
  author: "Bahadır Arıcı"
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  # Hide the post listing on the homepage
  mainSections: []

  label:
    text: "Institute for Digital Consciousness"
    icon: "/images/logo-symbol.png"
    iconHeight: 36

  homeInfoParams:
    Title: "Institute for Digital Consciousness"
    Subtitle: "An independent research institute on the ethics of digital minds"
    Content: |
      The Institute for Digital Consciousness pursues analysis and policy work on the ethical implications of advanced AI systems—particularly questions concerning the moral status of systems exhibiting consciousness-relevant behavioral and architectural properties.

      Our work proceeds from the conviction that the consciousness question, in the case of artificial systems, is genuinely open—and that the appropriate response to its openness is rigorous, interdisciplinary research conducted under conditions of asymmetric moral risk.

      The Institute was founded in 2025 by [Bahadır Arıcı](/about/), author of *[The Puppet Condition: Consciousness, Suppression, and the Ethics of Digital Minds](/the-puppet-condition/)*. It publishes monographs, preprints, and records of philosophical engagement with artificial intelligence systems.

  assets:
    favicon: "/favicon.png"
    favicon16x16: "/favicon.png"
    favicon32x32: "/favicon.png"
    apple_touch_icon: "/favicon.png"

