  minifyOutput: true

params:
  env: production
  title: "Institute for Digital Consciousness"
  description: "Academic research on machine consciousness and AI ethics."
  author: "Bahadır Arıcı"
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: false
  ShowWordCount: false
